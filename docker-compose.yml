      dockerfile: backend/services/identity-service/Dockerfile
    container_name: health-identity-service
    restart: unless-stopped
    logging: *default-logging
    environment:
      <<: *service-env
      IDENTITY_SERVICE_PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/v1/auth/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
