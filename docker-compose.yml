name: healthecosystem

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-service-env: &service-env
  NODE_ENV: production
  DATABASE_URL: postgresql://health:health@postgres:5432/healthecosystem?schema=public
  REDIS_URL: redis://redis:6379
  JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-256-bit-secret}
  JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
  JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
  ELASTICSEARCH_URL: http://elasticsearch:9200
  INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-change-me-in-production}
  AUDIT_SERVICE_URL: http://audit-service:3005
  CORS_ORIGINS: http://localhost:3100,http://web-admin:3100,http://localhost:3110,http://patient-mobile:3110,http://localhost:3120,http://phlebotomist-app:3120,http://localhost:3130,http://partner-portal:3130

services:
  postgres:
    image: postgres:16-alpine
    container_name: health-postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: health
      POSTGRES_PASSWORD: health
      POSTGRES_DB: healthecosystem
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health -d healthecosystem"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: health-redis
    restart: unless-stopped
    logging: *default-logging
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: health-elasticsearch
    restart: unless-stopped
    logging: *default-logging
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
      cluster.name: healthecosystem
      node.name: health-es-01
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: health-clickhouse
    restart: unless-stopped
    logging: *default-logging
    environment:
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: health
      CLICKHOUSE_PASSWORD: health
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  superset:
    image: apache/superset:4.0.2
    container_name: health-superset
    restart: unless-stopped
    logging: *default-logging
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-change-me-superset-secret}
      SUPERSET_LOAD_EXAMPLES: "no"
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: health-jaeger
    restart: unless-stopped
    logging: *default-logging
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  grafana:
    image: grafana/grafana:11.4.0
    container_name: health-grafana
    restart: unless-stopped
    logging: *default-logging
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3200:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  minio:
