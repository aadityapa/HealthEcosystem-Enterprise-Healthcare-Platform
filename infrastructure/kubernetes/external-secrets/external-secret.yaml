apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: health-platform-prod
  labels:
    app.kubernetes.io/part-of: healthecosystem
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: health-platform
            namespace: health-platform-prod
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: health-platform-secrets
  namespace: health-platform-prod
  labels:
    app.kubernetes.io/part-of: healthecosystem
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: health-platform-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        DATABASE_URL: "{{ .database_url }}"
        JWT_SECRET: "{{ .jwt_secret }}"
        INTERNAL_SERVICE_KEY: "{{ .internal_service_key }}"
        REDIS_URL: "{{ .redis_url }}"
  data:
    - secretKey: database_url
      remoteRef:
        key: healthecosystem/prod/database
        property: url
    - secretKey: jwt_secret
      remoteRef:
        key: healthecosystem/prod/auth
        property: jwt_secret
    - secretKey: internal_service_key
      remoteRef:
        key: healthecosystem/prod/auth
        property: internal_service_key
    - secretKey: redis_url
      remoteRef:
        key: healthecosystem/prod/redis
        property: url
