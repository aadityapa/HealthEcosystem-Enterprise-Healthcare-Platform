apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: health-platform
  labels:
    app.kubernetes.io/name: patient-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: healthecosystem
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: patient-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: patient-service
        app.kubernetes.io/component: backend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: patient-service
          image: healthecosystem/patient-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3003
              protocol: TCP
          envFrom:
            - configMapRef:
                name: health-platform-config
            - secretRef:
                name: health-platform-secrets
          env:
            - name: PATIENT_SERVICE_PORT
              value: "3003"
          readinessProbe:
            httpGet:
              path: /api/v1/patients/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/patients/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 150m
              memory: 384Mi
            limits:
              cpu: 750m
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
