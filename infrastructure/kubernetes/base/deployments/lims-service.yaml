apiVersion: apps/v1
kind: Deployment
metadata:
  name: lims-service
  labels:
    app.kubernetes.io/name: lims-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: healthecosystem
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lims-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lims-service
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: healthecosystem
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3004"
        prometheus.io/path: "/api/v1/lims/health"
    spec:
      serviceAccountName: health-platform
      terminationGracePeriodSeconds: 45
      containers:
        - name: lims-service
          image: healthecosystem/lims-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3004
              protocol: TCP
          envFrom:
            - configMapRef:
                name: health-platform-config
            - secretRef:
                name: health-platform-secrets
          env:
            - name: LIMS_SERVICE_PORT
              value: "3004"
          readinessProbe:
            httpGet:
              path: /api/v1/lims/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/lims/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
