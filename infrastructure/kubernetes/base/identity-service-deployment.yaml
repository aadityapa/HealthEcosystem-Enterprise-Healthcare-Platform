apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: health-platform
  labels:
    app.kubernetes.io/name: identity-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: healthecosystem
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: identity-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: identity-service
        app.kubernetes.io/component: backend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: identity-service
          image: healthecosystem/identity-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: health-platform-config
            - secretRef:
                name: health-platform-secrets
          env:
            - name: IDENTITY_SERVICE_PORT
              value: "3001"
          readinessProbe:
            httpGet:
              path: /api/v1/auth/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/auth/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
