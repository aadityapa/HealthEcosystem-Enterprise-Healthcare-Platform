apiVersion: apps/v1
kind: Deployment
metadata:
  name: lims-service
  namespace: health-platform
  labels:
    app.kubernetes.io/name: lims-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: healthecosystem
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: lims-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lims-service
        app.kubernetes.io/component: backend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: lims-service
          image: healthecosystem/lims-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3004
              protocol: TCP
          envFrom:
            - configMapRef:
                name: health-platform-config
            - secretRef:
                name: health-platform-secrets
          env:
            - name: LIMS_SERVICE_PORT
              value: "3004"
          readinessProbe:
            httpGet:
              path: /api/v1/lims/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/lims/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
